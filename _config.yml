################################################################################

# NB! Tread carefully if you want to change the variables below this point!

# Sections shown in the index page

homepage_sections:
  - about
  - research
  - publications
  - news
  - experience
  - contact

navigation:
  - label: About
    type: section
    target: about
  - label: Research
    type: section
    target: research
  - label: Publications
    type: page
    url: /publications/
  - label: News
    type: page
    url: /news/
  - label: Experience
    type: section
    target: experience
  - label: Contact
    type: section
    target: contact

# Exclusion list from the generated _site

exclude: ["LICENSE", "README.md", "CONTRIBUTING", "CONTRIBUTORS", "scripts", "docs"]

# Pagination path

paginate_path: "blog/page:num/"

# Enable minification SASS

sass:
  style: compressed

gems:
  - jekyll-paginate
  - jemoji
  - jekyll-spaceship

plugins:
  - jekyll-paginate
  - jemoji
  - jekyll-spaceship

# jekyll-spaceship: only enable the Mermaid processor (jemoji already handles
# emoji; leaving other processors off avoids overlap).
# Use ```mermaid!  (note the trailing "!") to mark a diagram code block.
jekyll-spaceship:
  processors:
    - mermaid-processor
  mermaid-processor:
    mode: pre-fetch   # fetch SVG from mermaid.ink at build time and inline it
    css:
      class: mermaid
