
# Site settings

# NB! Set your site's url, otherwise stuff will break :)

url: "https://jamesguoxin.github.io"

# If you're hosting your site at a Project repository on GitHub pages
# (https://yourusername.github.io/repository-name)
# and NOT your user repository (https://yourusername.github.io)
# then add in the baseurl here, like this: "/repository-name"
#
# NB! Without this *nothing* will work, because it's used in every path :)

baseurl: ""

# Google tracking id

google-tracking-id: ""

# Forces https everywhere in your website, except when you serve it locally
# If you are not hosted on Github Pages, and your host doesn't support https
# then you should disable it

force-https: True

#############
# HTML Head #
#############

lang: "en"
author: "Xin / James Guo"
title: "{ Xin / James Guo (郭昕) }"
description: "Principal Research Scientist at SAIS — AI for Life Sciences, Multimodal Foundation Models, and Scientific Agentic AI."
keywords: "xin, james, guo, introduction, start"
favicon: "/img/favicon.ico"

################
# Header layout #
################

black-favicon: "/img/black-lab-glass.ico"
logo: "/img/author.png" # leave blank if you don't want a logo

background-img: "../img/matterhorn.jpg"

##############################
# Dynamic Text on the Header #
##############################

dynamic-typing: True
shuffle: True # Shuffle the lines.
loop: True
loop-count: False # Set False for infinite loop, or set any number for finite loop.
type-speed: 10
start-delay: 500
delete-delay: 5000
lines: # You can add HTML Tags in the Text
  - text: "Running Up That Hill"
  - text: "Decoding Life with Foundation Models"

me-img: "/img/photo.JPG"

hero:
  name: "Xin / James Guo"
  role: "Principal Research Scientist at SAIS"
  focus-primary: "AI for Life Sciences · Multimodal Foundation Models"
  focus-secondary: "Scientific Agentic AI"

collaboration-statement: "I welcome research collaborations in AI for life sciences, multimodal foundation models, and scientific agentic AI."

# To use facebook profile pic comment the previous line and uncomment the following
# line, and replace 'user_id' with your facebook user id.
# Facebook user id can be found by clicking on your profile pic and the large number
# in the end of the url just before '&type' is your user id.
# Note: fbid is not the same as user id and user id only contains numbers

# me-img: "https://graph.facebook.com/user_id/picture?type=large&width=500&height=500"

# To use github profile pic uncomment the following line and replace 'user_name'
# with your github user name.

# me-img: "https://github.com/user_name.png?size=500"

# To use gravatar profile pic uncomment the following line and replace 'email_hash'
# with your gravatar profile email hash.
# You can create the email hash by using an online tool like 'http://www.md5hashgenerator.com/'
# just enter your email and it will generate the hash.

# me-img: "https://www.gravatar.com/avatar/email_hash?s=500"

##############################
# Color the browser elements #
##############################
color-browser: "#000000"
apple-status-bar-style: "black"

################
# Web app mode #
################

web-app-mode: True

# Icons for Web App mode

icon-36p: "/img/web-app/icon-36p.png"
icon-48p: "/img/web-app/icon-48p.png"
icon-72p: "/img/web-app/icon-72p.png"
icon-96p: "/img/web-app/icon-96p.png"
icon-144p: "/img/web-app/icon-144p.png"
icon-192p: "/img/web-app/icon-192p.png"

########
# Blog #
########

enable-gesture-navigation: True

post-preview-words: 64

paginate: 6

email-share: True
fb-share: True
twitter-share: True
linkedin-share: True
reddit-share: True
google-plus-share: False
tumblr-share: False
pinterest-share: False
pocket-share: True
vkontakte-share: False

disqus-shortname: "jamesguoxin"

syntax-highlight: True

############
# Timeline #
############

experience:
  - image: "/img/photo.JPG"
    date: "Apr. 2024 - Present"
    role: "Principal Research Scientist"
    organization: "SAIS"
  - image: "/img/timeline/alibaba.png"
    date: "Apr. 2016 - Apr. 2024"
    role: "Senior R&D Engineer"
    organization: "Ant & Alibaba Group"
  - image: "/img/timeline/epfl.jpg"
    date: "Sep. 2012 - Nov. 2015"
    role: "MSc in Communication Systems"
    organization: "EPFL"
  - image: "/img/timeline/zju.png"
    date: "Sep. 2008 - Jun. 2012"
    role: "BEng with Honors"
    organization: "Zhejiang University"

# First image of the Timeline

timeline-img: "/img/timeline/hangzhou.png"

###########
# Contact #
###########

email: "tigerguoxin@gmail.com"


# Set a url pointing to your publish PGP Public Key here, and it will appear in the Contact section
# pgp: False

################
# Author Blurb #
################

# The author blurb goes underneath blog posts.
# This works best when your author blurb image has a transparent background, or matches your site background color.

# if the author_blurb is not set, then this feature is skipped
author_blurb: "Xin is a Researcher specializing in AI4 (Life) Science, Machine Learning and Computer Vision. He currently resides in Shanghai, China, and has previously studied and worked in Switzerland, Germany and the UK. In his leisure time, Xin enjoys drinking coffee and indulging in Swiss chocolate. Additionally, he is an amateur badminton and basketball player, with Stephen Curry being his favorite basketball player."
author_blurb_image: "/img/bib.png"

##################
# Social Buttons #
##################

social:
  - title: "google-scholar"
    url: "https://scholar.google.com/citations?user=d2eWV9wAAAAJ"
    icon: "ai ai-google-scholar"
  - title: "linkedin"
    url: "https://www.linkedin.com/in/xinjamesguo89/?profileId=ACoAAATHaGMBHX5Mw6_MaqC3koDJ7thWYEmoWnQ"
  - title: "github"
    url: "https://github.com/jamesguoxin"
  - title: "orcid"
    url: "https://orcid.org/0009-0003-3414-8564"
    icon: "ai ai-orcid"

############
# 404 page #
############

err-404-img: "/img/labtocat.png"

##################
# GPG on Keybase #
##################

