# Publications data shared by the homepage selection and complete
# Publications page.
#
# Each top-level entry is a section. The complete page renders section names as
# <h2> headings; the selected homepage view renders each paper's topic label.
# Per-paper fields:
#   title    (required) — paper title
#   url      (optional) — if present, the title is hyperlinked; if omitted, plain text
#   authors  (required) — full author string; the literal "Xin Guo" is auto-highlighted
#   venue    (required) — venue + year, rendered in bold
#   me_mark  (optional) — "equal" appends * / "corr" appends ✉ after the highlighted Xin Guo
#   selected (optional) — include the paper in the homepage selection
#   topic    (optional) — homepage topic label
#   homepage_order (optional) — homepage display order
#   representative (optional) — identify the primary representative work
#   code     (optional) — official source repository
#   project  (optional) — project page or demo

