- date: "2026.06.13"
  content: '🏅 Honored to receive the <a href="https://icml.cc/">ICML 2026 Silver Reviewer Award</a>. Grateful for the recognition and for the opportunity to contribute to the research community.'
- date: "2026.05.29"
  content: '🎉 Two papers accepted: <a href="https://arxiv.org/abs/2605.18055">FLAG</a>, on foundation-model-aligned latent diffusion for spatial gene expression prediction, at <a href="https://icml.cc/">ICML 2026</a>; and "Sprint or Delve: A Distribution-Aware Approach to Efficient Reasoning" at <a href="https://2026.ijcai.org/">IJCAI 2026</a>. Congrats to all co-authors!'
- date: "2026.03.29"
  content: '📚 Two recent works have been published: one in <a href="https://www.nature.com/articles/s43588-026-00973-3">Nature Computational Science</a> on generalizable X-ray tomography restoration, and another in <a href="https://ojs.aaai.org/index.php/AAAI/article/view/37070">AAAI 2026</a> focusing on structure-based RNA design using latent diffusion models.'
- date: "2025.12.20"
  content: '🏅 Honored to be selected for the Shanghai Oriental Talent Program (Young Talent Project). Grateful for the recognition and support from the Shanghai government.'
- date: "2025.08.09"
  content: '🧬 Our recent <a href="https://advanced.onlinelibrary.wiley.com/doi/full/10.1002/advs.202505021">work</a> on single-cell long-range cis-regulation prediction is accepted by <a href="https://advanced.onlinelibrary.wiley.com/journal/21983844">Advanced Science</a>.'
- date: "2025.07.06"
  content: '😁 Three papers are accepted by <a href="https://icml.cc/">ICML 2025</a> and <a href="https://iccv.thecvf.com/">ICCV 2025</a>; details are available <a href="https://arxiv.org/pdf/2506.12352">here</a>, <a href="https://mp.weixin.qq.com/s/LTa6r5vA8RN829g7tQQYfw">here</a>, and <a href="https://mp.weixin.qq.com/s/j3tKTRlYORSPRY0Y0ICjnA">here</a>.'
- date: "2025.02.03"
  content: '🌏 Several previous projects are now easier to find: <a href="https://openaccess.thecvf.com/content/CVPR2024/html/Guo_SkySense_A_Multi-Modal_Remote_Sensing_Foundation_Model_Towards_Universal_Interpretation_CVPR_2024_paper.html">SkySense</a> is open-sourced <a href="https://github.com/Jack-bo1220/SkySense">here</a>, <a href="https://eccv.ecva.net/virtual/2024/poster/442">POA</a> code is available <a href="https://github.com/alipay/POA/tree/main">here</a>, and <a href="https://dl.acm.org/doi/abs/10.1145/3664647.3680799">PECEL</a> inquiries can go to <a href="https://rulixiang.github.io/">Dr. Lixiang Ru</a>.'
