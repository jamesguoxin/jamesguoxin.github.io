{% assign news_limit = include.limit | default: site.data.news.size %}
<div class="news-list">
  {% for item in site.data.news limit: news_limit %}
    <article class="news-item">
      <time datetime="{{ item.date | replace: '.', '-' }}">{{ item.date }}</time>
      <div>{{ item.content }}</div>
    </article>
  {% endfor %}
</div>
