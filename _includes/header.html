
<!-- Intro Start -->

<header class="intro">
  <div class="intro-body">
    <div class="container">
      <div class="row">
          <div class="col-12 col-md-10 offset-md-1">
            <h1 class="hero-name">{{ site.hero.name }}</h1>
            <p class="hero-role">{{ site.hero.role }}</p>
            <p class="hero-focus">
              <span>{{ site.hero.focus-primary }}</span>
              <span>{{ site.hero.focus-secondary }}</span>
            </p>
            <div class="hero-divider" aria-hidden="true"></div>
            <span class="intro-text">{{ content }}</span>
            <nav class="hero-actions" aria-label="Primary profile links">
              <a class="hero-action hero-action-primary" href="{{ site.baseurl }}/publications/">Publications</a>
              {% for item in site.social %}
                {% if item.title == "google-scholar" %}
                  <a class="hero-action" href="{{ item.url }}" target="_blank" rel="noopener noreferrer">Google Scholar</a>
                {% endif %}
              {% endfor %}
              <a class="hero-action page-scroll" href="#contact">Contact</a>
              {% if site.cv.english %}
                <a class="hero-action" href="{{ site.cv.english | relative_url }}" target="_blank" rel="noopener noreferrer">CV</a>
              {% endif %}
            </nav>
            <a href="#about" class="page-scroll intro-scroll" aria-label="Scroll to About">
              <i class="fa-solid fa-angle-down"></i>
            </a>
          </div>
        </div>
    </div>
  </div>
</header>

<!-- Intro End -->
